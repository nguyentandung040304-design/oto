<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Lịch Hẹn | Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body class="admin-body">
    <div class="admin-layout">
        <aside class="sidebar">
            <h2>MERCEDES-BENZ ADMIN</h2>
            <nav>
                <a href="/admin/dashboard">Tổng Quan</a>
                <a href="/admin/products">Quản Lý Xe</a>
                <a href="/admin/orders">Đơn Hàng</a>
                <a href="/admin/bookings" class="active">Lịch Hẹn</a>
                <a href="/admin/users">Quản Lý Người Dùng</a>
                <a href="/admin/contacts">Lời Nhắn</a>
                <a href="/" style="margin-top: 5rem;">Thoát</a>
            </nav>
        </aside>
        <main class="main-content" style="padding: 0;">
            <header style="background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(10px); padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); width: 100%;">
                <div style="color: var(--primary); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; font-size: 0.8rem;">Quản lý lịch hẹn</div>
            </header>
            
            <div style="padding: 3rem 5%;">
                <h1 style="font-family: 'Playfair Display'; font-size: 2.5rem; margin-bottom: 2rem;">Tất Cả Lịch Hẹn</h1>
            
            <div class="admin-card">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Khách hàng</th>
                            <th>Liên hệ</th>
                            <th>Ngày hẹn</th>
                            <th>Loại lịch hẹn</th>
                            <th>Thông tin chi tiết</th>
                            <th>Trạng thái</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="booking-list"></tbody>
                </table>
            </div>
        </main>
    </div>
    <footer></footer>

    <script src="../../js/api.js"></script>
    <script src="../../js/navigation.js"></script>
    <script>
        async function loadBookings() {
            const res = await fetch('/api/bookings');
            const bookings = await res.json();
            const list = document.getElementById('booking-list');
            list.innerHTML = '';
            
            bookings.forEach(b => {
                const statusClass = b.status === 'confirmed' ? 'status-confirmed' : 'status-pending';
                const statusText = b.status === 'confirmed' ? 'Đã xác nhận' : 'Chờ duyệt';

                let typeText = 'Lái thử';
                if (b.type === 'bảo hành') typeText = 'Bảo hành';
                if (b.type === 'bảo dưỡng') typeText = 'Bảo dưỡng';

                let details = '';
                if (b.type === 'lái thử' || !b.type) {
                    details = `Xe: <strong>${b.vehicleName || 'Đang chọn...'}</strong>`;
                    if (b.note) details += `<br><span style="font-size: 0.8rem; color: #aaa;">Ghi chú: ${b.note}</span>`;
                } else {
                    details = `<span style="font-size: 0.85rem; color: #ddd;">${b.note || ''}</span>`;
                }

                list.innerHTML += `
                    <tr>
                        <td><strong>${b.name}</strong></td>
                        <td>
                            ${b.phone}<br>
                            <span style="font-size: 0.8rem; color: #666;">${b.email}</span>
                        </td>
                        <td>${b.date} vào ${b.time}</td>
                        <td><span style="background: #111; padding: 0.3rem 0.6rem; border: 1px solid #333; border-radius: 4px; font-size: 0.8rem; color: #d4af37;">${typeText}</span></td>
                        <td>${details}</td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                        <td>
                            <div style="display: flex; gap: 0.8rem; align-items: center;">
                                ${b.status !== 'confirmed' ? `
                                    <button onclick="updateBookingStatus('${b._id}', 'confirmed')" style="background: rgba(193, 163, 95, 0.1); border: 1px solid rgba(193, 163, 95, 0.4); color: var(--primary); padding: 0.4rem 1rem; border-radius: 20px; cursor: pointer; font-size: 0.75rem; font-weight: 600; letter-spacing: 1px; transition: all 0.3s ease;" onmouseover="this.style.background='var(--primary)'; this.style.color='#000'" onmouseout="this.style.background='rgba(193, 163, 95, 0.1)'; this.style.color='var(--primary)'">XÁC NHẬN</button>
                                ` : ''}
                                <button onclick="deleteBooking('${b._id}')" style="background: rgba(255, 77, 77, 0.05); border: 1px solid rgba(255, 77, 77, 0.3); color: #ff4d4d; padding: 0.4rem 1rem; border-radius: 20px; cursor: pointer; font-size: 0.75rem; font-weight: 600; letter-spacing: 1px; transition: all 0.3s ease;" onmouseover="this.style.background='#ff4d4d'; this.style.color='#fff'" onmouseout="this.style.background='rgba(255, 77, 77, 0.05)'; this.style.color='#ff4d4d'">XÓA</button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        }

        async function updateBookingStatus(id, status) {
            const res = await fetch(`/api/bookings/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status })
            });
            if (res.ok) loadBookings();
        }

        async function deleteBooking(id) {
            if (confirm('Xóa lịch hẹn này?')) {
                const res = await fetch(`/api/bookings/${id}`, { method: 'DELETE' });
                if (res.ok) loadBookings();
            }
        }

        document.addEventListener('DOMContentLoaded', loadBookings);
    </script>
</body>
</html>
