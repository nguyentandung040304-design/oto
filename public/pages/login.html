<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập | Mercedes-Benz Việt Nam</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            background-image: url('https://images.unsplash.com/photo-1618843479313-40f8afb4b4d8?auto=format&fit=crop&q=80&w=1600');
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .auth-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.6) 100%);
        }
        .auth-card {
            background: rgba(10, 10, 10, 0.65);
            backdrop-filter: blur(24px) saturate(1.2);
            -webkit-backdrop-filter: blur(24px) saturate(1.2);
            padding: 4.5rem 3.5rem;
            border-radius: 8px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            width: 100%;
            max-width: 440px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), inset 0 0 20px rgba(212, 175, 55, 0.05);
            position: relative;
            z-index: 1;
            transform: translateY(0);
            transition: all 0.4s ease;
        }
        .form-group {
            margin-bottom: 2rem;
            position: relative;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.6rem;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 3px;
        }
        .form-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255,255,255,0.1);
            color: #ffffff;
            padding: 1rem 1.2rem;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: 0.3s ease;
            box-sizing: border-box;
        }
        .form-group input::placeholder {
            color: rgba(255,255,255,0.2);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(212, 175, 55, 0.05);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.15);
        }
        .auth-heading {
            margin-bottom: 3.5rem;
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 2.2rem;
            background: linear-gradient(to right, #fff, var(--primary), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 1.2rem;
        }
        .login-options-left {
            display: flex;
            align-items: center;
            gap: 0.7rem;
        }
        /* Hide default checkbox */
        .login-options-left input[type="checkbox"] {
            display: none;
        }
        /* Custom checkbox */
        .custom-checkbox {
            width: 18px;
            height: 18px;
            border: 1px solid rgba(212,175,55,0.4);
            border-radius: 3px;
            background: rgba(255,255,255,0.03);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s ease;
            position: relative;
        }
        .custom-checkbox::after {
            content: '';
            width: 10px;
            height: 6px;
            border-left: 2px solid var(--primary);
            border-bottom: 2px solid var(--primary);
            transform: rotate(-45deg) scale(0);
            transition: transform 0.15s ease;
            position: absolute;
            top: 4px;
        }
        .login-options-left input[type="checkbox"]:checked + .custom-checkbox {
            background: rgba(212,175,55,0.12);
            border-color: var(--primary);
            box-shadow: 0 0 8px rgba(212,175,55,0.2);
        }
        .login-options-left input[type="checkbox"]:checked + .custom-checkbox::after {
            transform: rotate(-45deg) scale(1);
        }
        .login-options-left label {
            margin-bottom: 0;
            font-size: 0.82rem;
            cursor: pointer;
            text-transform: none;
            letter-spacing: 0.5px;
            color: rgba(255,255,255,0.65);
            user-select: none;
            transition: color 0.2s;
        }
        .login-options-left label:hover { color: rgba(255,255,255,0.9); }
        .forgot-password {
            color: rgba(212,175,55,0.7);
            font-size: 0.8rem;
            text-decoration: none;
            transition: all 0.2s;
            letter-spacing: 0.5px;
            border-bottom: 1px solid transparent;
            padding-bottom: 1px;
        }
        .forgot-password:hover {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        .btn-full {
            width: 100%;
            padding: 1.2rem;
            margin-top: 3rem;
            background: linear-gradient(135deg, var(--primary), #b38f24);
            color: #000;
            border: none;
            border-radius: 4px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }
        .btn-full:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.4);
            background: linear-gradient(135deg, #e3c45a, var(--primary));
        }
        .login-footer-text {
            text-align: center;
            margin-top: 2.5rem;
            color: rgba(255,255,255,0.6);
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        .login-footer-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            margin-left: 0.3rem;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
        }
        .login-footer-link:hover {
            color: #ffffff;
            text-shadow: 0 0 8px var(--primary);
        }
    </style>
</head>
<body>
    <header></header>
 
    <!-- Toast Notification -->
    <div id="toast-notification" style="position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; align-items: center; gap: 1rem; padding: 1rem 1.5rem; border-radius: 8px; background: rgba(18,18,18,0.95); backdrop-filter: blur(10px); color: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transform: translateX(120%); transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); border-left: 4px solid var(--primary);">
        <div id="toast-icon" style="font-size: 1.2rem;"></div>
        <div id="toast-message" style="font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 500; letter-spacing: 0.5px;"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <h2 class="auth-heading">Đăng Nhập</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Email</label>
                    <input type="text" id="username" name="username" autocomplete="username" required placeholder="example@gmail.com">
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="•••••••••••••">
                </div>
                <div class="form-group login-options">
                    <div class="login-options-left">
                        <input type="checkbox" id="remember">
                        <span class="custom-checkbox" onclick="document.getElementById('remember').click()"></span>
                        <label for="remember">Ghi nhớ đăng nhập</label>
                    </div>
                    <a href="/forgot-password" class="forgot-password">Quên mật khẩu?</a>
                </div>
                <button type="submit" class="btn-full">Đăng Nhập</button>
            </form>
            <p class="login-footer-text">Chưa có tài khoản? <a href="/register" class="login-footer-link">Đăng ký</a></p>
        </div>
    </div>

    <footer></footer>

    <script src="../js/api.js"></script>
    <script src="../js/navigation.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Tự động điền email nếu đã ghi nhớ trước đó
            const savedEmail = localStorage.getItem('rememberedEmail');
            if (savedEmail) {
                document.getElementById('username').value = savedEmail;
                document.getElementById('remember').checked = true;
            }
        });

        function showToast(message, type = 'error') {
            const toast = document.getElementById('toast-notification');
            const msgEl = document.getElementById('toast-message');
            const iconEl = document.getElementById('toast-icon');
            
            msgEl.textContent = message;
            if (type === 'success') {
                toast.style.borderLeftColor = '#137333';
                iconEl.innerHTML = '✓';
                iconEl.style.color = '#137333';
            } else {
                toast.style.borderLeftColor = '#ff4d4d';
                iconEl.innerHTML = '⚠';
                iconEl.style.color = '#ff4d4d';
            }
            
            toast.style.transform = 'translateX(0)';
            setTimeout(() => {
                toast.style.transform = 'translateX(120%)';
            }, 3000);
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalBtnText = btn.textContent;
            btn.textContent = 'ĐANG XỬ LÝ...';
            btn.disabled = true;

            const email = document.getElementById('username').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;

            try {
                const data = await API.login({ email, password });
                if (data.error) {
                    let errorMsg = data.error;
                    if (errorMsg === 'Invalid email or password' || errorMsg === 'Invalid credentials' || errorMsg.includes('Invalid')) {
                        errorMsg = 'Sai email hoặc mật khẩu!';
                    }
                    showToast(errorMsg, 'error');
                    btn.textContent = originalBtnText;
                    btn.disabled = false;
                } else {
                    // Xử lý ghi nhớ email
                    if (remember) {
                        localStorage.setItem('rememberedEmail', email);
                    } else {
                        localStorage.removeItem('rememberedEmail');
                    }

                    showToast('Đăng nhập thành công! Đang chuyển hướng...', 'success');
                    
                    setTimeout(() => {
                        const user = data.user;
                        if (user.role === 'admin' || user.role === 'employee') {
                            window.location.href = '/admin/dashboard';
                        } else {
                            window.location.href = '/';
                        }
                    }, 1000);
                }
            } catch (err) {
                showToast('Lỗi kết nối server', 'error');
                btn.textContent = originalBtnText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
