<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên Mật Khẩu | Mercedes-Benz Việt Nam</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { padding-top: 0 !important; }
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            background-image: url('https://images.unsplash.com/photo-1618843479313-40f8afb4b4d8?auto=format&fit=crop&q=80&w=1600');
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .auth-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.65) 100%);
        }
        .auth-card {
            background: rgba(10, 10, 10, 0.65);
            backdrop-filter: blur(24px) saturate(1.2);
            -webkit-backdrop-filter: blur(24px) saturate(1.2);
            padding: 4.5rem 3.5rem;
            border-radius: 8px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            width: 100%;
            max-width: 440px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), inset 0 0 20px rgba(212, 175, 55, 0.05);
            position: relative;
            z-index: 1;
        }
        .auth-heading {
            margin-bottom: 0.8rem;
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 2rem;
            background: linear-gradient(to right, #fff, var(--primary), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .auth-subheading {
            text-align: center;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 0.5px;
            margin-bottom: 3rem;
            line-height: 1.6;
        }
        .form-group {
            margin-bottom: 2rem;
            position: relative;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.6rem;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 3px;
        }
        .form-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255,255,255,0.1);
            color: #ffffff;
            padding: 1rem 1.2rem;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: 0.3s ease;
            box-sizing: border-box;
        }
        .form-group input::placeholder {
            color: rgba(255,255,255,0.2);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(212, 175, 55, 0.05);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.15);
        }
        .btn-full {
            width: 100%;
            padding: 1.2rem;
            margin-top: 1rem;
            background: linear-gradient(135deg, var(--primary), #b38f24);
            color: #000;
            border: none;
            border-radius: 4px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }
        .btn-full:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.4);
        }
        .btn-full:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 2rem;
            color: rgba(255,255,255,0.5);
            font-size: 0.85rem;
            text-decoration: none;
            letter-spacing: 0.5px;
            transition: 0.2s;
        }
        .back-link:hover { color: var(--primary); }
        .back-link span { margin-right: 0.4rem; }

        /* Success state */
        .success-state {
            display: none;
            text-align: center;
            padding: 1rem 0;
        }
        .success-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: rgba(212, 175, 55, 0.1);
            border: 2px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 1.8rem;
        }
        .success-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: #fff;
            margin-bottom: 0.8rem;
            letter-spacing: 1px;
        }
        .success-desc {
            font-size: 0.88rem;
            color: rgba(255,255,255,0.55);
            line-height: 1.7;
        }
        .success-email-highlight {
            color: var(--primary);
            font-weight: 600;
        }

        /* Error / toast */
        #toast {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 9999;
            padding: 1rem 1.5rem;
            border-radius: 6px;
            background: rgba(18,18,18,0.95);
            backdrop-filter: blur(10px);
            color: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-left: 4px solid #ff4d4d;
            font-size: 0.9rem;
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            max-width: 320px;
        }
        #toast.show { transform: translateX(0); }
        #toast.success { border-left-color: var(--primary); }
    </style>
</head>
<body>
    <header></header>
    <div id="toast"></div>

    <div class="auth-container">
        <div class="auth-card">
            <!-- Form state -->
            <div id="form-state">
                <h2 class="auth-heading">Quên Mật Khẩu</h2>
                <p class="auth-subheading">Nhập địa chỉ email đã đăng ký.<br>Chúng tôi sẽ gửi link đặt lại mật khẩu cho bạn.</p>
                <form id="forgot-form">
                    <div class="form-group">
                        <label for="email">Địa chỉ Email</label>
                        <input type="email" id="email" name="email" required placeholder="example@gmail.com" autocomplete="email">
                    </div>
                    <button type="submit" class="btn-full" id="submit-btn">Gửi Link Đặt Lại</button>
                </form>
                <a href="/login" class="back-link"><span>←</span> Quay lại đăng nhập</a>
            </div>

            <!-- Success state -->
            <div class="success-state" id="success-state">
                <div class="success-icon">✉️</div>
                <div class="success-title">Kiểm tra Email của bạn</div>
                <p class="success-desc">
                    Chúng tôi đã gửi link đặt lại mật khẩu đến<br>
                    <span class="success-email-highlight" id="sent-email"></span><br><br>
                    Link sẽ hết hạn sau <strong style="color:#fff;">30 phút</strong>.<br>
                    Không thấy email? Hãy kiểm tra hộp thư Spam.
                </p>
                <a href="/login" class="back-link" style="margin-top:2.5rem;"><span>←</span> Quay lại đăng nhập</a>
            </div>
        </div>
    </div>

    <footer></footer>
    <script src="../js/api.js"></script>
    <script src="../js/navigation.js"></script>
    <script>
        function showToast(msg, isSuccess = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'show' + (isSuccess ? ' success' : '');
            setTimeout(() => toast.className = '', 4000);
        }

        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const btn = document.getElementById('submit-btn');
            btn.textContent = 'ĐANG GỬI...';
            btn.disabled = true;

            try {
                const data = await API.forgotPassword(email);
                if (data.error) {
                    showToast(data.error);
                    btn.textContent = 'Gửi Link Đặt Lại';
                    btn.disabled = false;
                } else {
                    document.getElementById('form-state').style.display = 'none';
                    document.getElementById('sent-email').textContent = email;
                    document.getElementById('success-state').style.display = 'block';
                }
            } catch (err) {
                showToast('Lỗi kết nối server. Vui lòng thử lại.');
                btn.textContent = 'Gửi Link Đặt Lại';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
