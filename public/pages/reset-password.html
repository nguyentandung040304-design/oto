<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt Lại Mật Khẩu | Mercedes-Benz Việt Nam</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { padding-top: 0 !important; }
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            background-image: url('https://images.unsplash.com/photo-1618843479313-40f8afb4b4d8?auto=format&fit=crop&q=80&w=1600');
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .auth-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.65) 100%);
        }
        .auth-card {
            background: rgba(10, 10, 10, 0.65);
            backdrop-filter: blur(24px) saturate(1.2);
            -webkit-backdrop-filter: blur(24px) saturate(1.2);
            padding: 4.5rem 3.5rem;
            border-radius: 8px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            width: 100%;
            max-width: 440px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), inset 0 0 20px rgba(212, 175, 55, 0.05);
            position: relative;
            z-index: 1;
        }
        .auth-heading {
            margin-bottom: 0.8rem;
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 1.8rem;
            background: linear-gradient(to right, #fff, var(--primary), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .auth-subheading {
            text-align: center;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 0.5px;
            margin-bottom: 3rem;
            line-height: 1.6;
        }
        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.6rem;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 3px;
        }
        .form-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255,255,255,0.1);
            color: #ffffff;
            padding: 1rem 1.2rem;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: 0.3s ease;
            box-sizing: border-box;
        }
        .form-group input::placeholder {
            color: rgba(255,255,255,0.2);
            font-size: 0.9rem;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(212, 175, 55, 0.05);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.15);
        }
        .form-group input.error {
            border-color: #ff4d4d;
            box-shadow: 0 0 10px rgba(255, 77, 77, 0.15);
        }

        /* Password strength */
        .strength-bar {
            height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin-top: 0.6rem;
            overflow: hidden;
        }
        .strength-fill {
            height: 100%;
            width: 0;
            border-radius: 2px;
            transition: all 0.3s ease;
        }
        .strength-text {
            font-size: 0.72rem;
            margin-top: 0.3rem;
            letter-spacing: 0.5px;
            color: rgba(255,255,255,0.4);
            transition: color 0.3s;
        }

        .btn-full {
            width: 100%;
            padding: 1.2rem;
            margin-top: 1rem;
            background: linear-gradient(135deg, var(--primary), #b38f24);
            color: #000;
            border: none;
            border-radius: 4px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }
        .btn-full:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.4);
        }
        .btn-full:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 2rem;
            color: rgba(255,255,255,0.5);
            font-size: 0.85rem;
            text-decoration: none;
            letter-spacing: 0.5px;
            transition: 0.2s;
        }
        .back-link:hover { color: var(--primary); }

        /* Invalid token state */
        .error-state {
            display: none;
            text-align: center;
        }
        .error-icon {
            font-size: 3rem;
            margin-bottom: 1.2rem;
        }
        .error-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: #fff;
            margin-bottom: 0.8rem;
        }
        .error-desc {
            font-size: 0.88rem;
            color: rgba(255,255,255,0.55);
            line-height: 1.7;
        }

        /* Success state */
        .success-state {
            display: none;
            text-align: center;
        }
        .success-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: rgba(212, 175, 55, 0.1);
            border: 2px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 1.8rem;
        }
        .success-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: #fff;
            margin-bottom: 0.8rem;
        }
        .success-desc {
            font-size: 0.88rem;
            color: rgba(255,255,255,0.55);
            line-height: 1.7;
        }

        #toast {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 9999;
            padding: 1rem 1.5rem;
            border-radius: 6px;
            background: rgba(18,18,18,0.95);
            backdrop-filter: blur(10px);
            color: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-left: 4px solid #ff4d4d;
            font-size: 0.9rem;
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            max-width: 320px;
        }
        #toast.show { transform: translateX(0); }
    </style>
</head>
<body>
    <header></header>
    <div id="toast"></div>

    <div class="auth-container">
        <div class="auth-card">

            <!-- Checking token state (default) -->
            <div id="form-state">
                <h2 class="auth-heading">Mật Khẩu Mới</h2>
                <p class="auth-subheading">Tạo mật khẩu mới cho tài khoản của bạn.<br>Mật khẩu phải có ít nhất 6 ký tự.</p>
                <form id="reset-form">
                    <div class="form-group">
                        <label for="new-password">Mật khẩu mới</label>
                        <input type="password" id="new-password" required placeholder="••••••••" autocomplete="new-password">
                        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
                        <div class="strength-text" id="strength-text"></div>
                    </div>
                    <div class="form-group">
                        <label for="confirm-password">Xác nhận mật khẩu</label>
                        <input type="password" id="confirm-password" required placeholder="••••••••" autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn-full" id="submit-btn">Đặt Lại Mật Khẩu</button>
                </form>
            </div>

            <!-- Invalid token state -->
            <div class="error-state" id="error-state">
                <div class="error-icon">⛔</div>
                <div class="error-title">Link không hợp lệ</div>
                <p class="error-desc">Link đặt lại mật khẩu đã hết hạn hoặc không hợp lệ.<br>Vui lòng yêu cầu lại.</p>
                <a href="/forgot-password" class="btn-full" style="display:block; text-align:center; text-decoration:none; margin-top:2rem;">Yêu cầu link mới</a>
            </div>

            <!-- Success state -->
            <div class="success-state" id="success-state">
                <div class="success-icon">✓</div>
                <div class="success-title">Thành công!</div>
                <p class="success-desc">Mật khẩu của bạn đã được đặt lại thành công.<br>Đang chuyển đến trang đăng nhập...</p>
            </div>

        </div>
    </div>

    <footer></footer>
    <script src="../js/api.js"></script>
    <script src="../js/navigation.js"></script>
    <script>
        const token = new URLSearchParams(window.location.search).get('token');

        // If no token in URL, show error immediately
        if (!token) {
            document.getElementById('form-state').style.display = 'none';
            document.getElementById('error-state').style.display = 'block';
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'show';
            setTimeout(() => toast.className = '', 4000);
        }

        // Password strength checker
        document.getElementById('new-password').addEventListener('input', function () {
            const val = this.value;
            const fill = document.getElementById('strength-fill');
            const text = document.getElementById('strength-text');
            let strength = 0;
            if (val.length >= 6) strength++;
            if (val.length >= 10) strength++;
            if (/[A-Z]/.test(val)) strength++;
            if (/[0-9]/.test(val)) strength++;
            if (/[^A-Za-z0-9]/.test(val)) strength++;

            const colors = ['', '#ff4d4d', '#ff8c00', '#d4af37', '#4caf50', '#00c853'];
            const labels = ['', 'Rất yếu', 'Yếu', 'Trung bình', 'Mạnh', 'Rất mạnh'];
            fill.style.width = (strength * 20) + '%';
            fill.style.background = colors[strength] || '';
            text.textContent = val.length > 0 ? labels[strength] : '';
            text.style.color = colors[strength] || 'rgba(255,255,255,0.4)';
        });

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const confirmInput = document.getElementById('confirm-password');

            if (newPassword !== confirmPassword) {
                confirmInput.classList.add('error');
                showToast('Mật khẩu xác nhận không khớp!');
                return;
            }
            confirmInput.classList.remove('error');

            const btn = document.getElementById('submit-btn');
            btn.textContent = 'ĐANG XỬ LÝ...';
            btn.disabled = true;

            try {
                const data = await API.resetPassword(token, newPassword);
                if (data.error) {
                    // Could be expired token
                    if (data.error.includes('hết hạn') || data.error.includes('hợp lệ')) {
                        document.getElementById('form-state').style.display = 'none';
                        document.getElementById('error-state').style.display = 'block';
                    } else {
                        showToast(data.error);
                        btn.textContent = 'Đặt Lại Mật Khẩu';
                        btn.disabled = false;
                    }
                } else {
                    document.getElementById('form-state').style.display = 'none';
                    document.getElementById('success-state').style.display = 'block';
                    setTimeout(() => { window.location.href = '/login'; }, 2500);
                }
            } catch (err) {
                showToast('Lỗi kết nối server. Vui lòng thử lại.');
                btn.textContent = 'Đặt Lại Mật Khẩu';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
