<!DOCTYPE html>
<html lang="vi">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>So Sánh Xe | Mercedes-Benz Việt Nam</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .compare-container { 
            padding: 2rem 5% 4rem 5%; 
            margin-top: 80px;
        }
        .compare-table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 2rem; 
            background: #ffffff; 
            border-radius: 0; 
            overflow: hidden; 
            border: 1px solid var(--border);
        }
        .compare-table th, .compare-table td { 
            padding: 1.5rem; 
            text-align: center; 
            border: 1px solid var(--border); 
            color: #121212;
        }
        .compare-table th { 
            background: #f8f9fa; 
        }
        .spec-label { 
            text-align: left !important; 
            color: var(--primary) !important; 
            font-weight: 600; 
            width: 200px; 
        }
        .vehicle-img { 
            width: 100%; 
            max-width: 250px; 
            border-radius: 0; 
            margin-bottom: 1rem; 
        }

    </style>
</head>
<body>
    <header></header>

    <div class="compare-container">
        <h1>So Sánh Thông Số Kỹ Thuật</h1>
        <div id="compare-wrapper">
            <p id="empty-msg" style="margin-top: 2rem; color: var(--text-muted);">Danh sách so sánh đang trống. Hãy quay lại <a href="/collection" style="color: var(--primary);">Sưu tập</a> để thêm xe.</p>
            <table class="compare-table" id="compare-table" style="display: none;">
                <thead id="table-head">
                    <!-- JS populate headers with images/names -->
                </thead>
                <tbody id="table-body">
                    <!-- JS populate rows with specs -->
                </tbody>
            </table>
            <button onclick="clearCompare()" class="btn" style="margin-top: 2rem; border: 1px solid #ff4d4d; color: #ff4d4d; display: none; background: transparent; padding: 0.8rem 2rem; border-radius: 0; cursor: pointer; text-transform: uppercase; font-weight: 600; font-size: 0.8rem; letter-spacing: 1px;" id="clear-btn">Xóa danh sách so sánh</button>
        </div>
    </div>

    <footer></footer>

    <script src="../js/api.js"></script>
    <script src="../js/navigation.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const compareList = JSON.parse(localStorage.getItem('compareList') || '[]');
            if (compareList.length === 0) return;

            document.getElementById('empty-msg').style.display = 'none';
            document.getElementById('compare-table').style.display = 'table';
            document.getElementById('clear-btn').style.display = 'block';

            try {
                const vehicles = await Promise.all(compareList.map(id => API.getVehicle(id)));
                
                const head = document.getElementById('table-head');
                let headHtml = '<tr><th class="spec-label">Sản phẩm</th>';
                vehicles.forEach(v => {
                    headHtml += `
                        <th>
                            <img src="${v.images[0]}" class="vehicle-img">
                            <h3>${v.name}</h3>
                            <p style="color: var(--text-muted);">${v.brand}</p>
                        </th>
                    `;
                });
                headHtml += '</tr>';
                head.innerHTML = headHtml;

                const body = document.getElementById('table-body');
                const specs = [
                    { label: 'Giá niêm yết', key: 'price', format: (v) => new Intl.NumberFormat('vi-VN').format(v) + 'đ' },
                    { label: 'Loại xe', key: 'type' },
                    { label: 'Nhiên liệu', key: 'fuel' },
                    { label: 'Động cơ', key: 'engine' },
                    { label: 'Công suất', key: 'horsepower', path: 'specs.horsepower', suffix: ' HP' },
                    { label: 'Mô-men xoắn', key: 'torque', path: 'specs.torque', suffix: ' Nm' }
                ];

                let bodyHtml = '';
                specs.forEach(s => {
                    bodyHtml += `<tr><td class="spec-label">${s.label}</td>`;
                    vehicles.forEach(v => {
                        let val = s.path ? s.path.split('.').reduce((obj, key) => obj && obj[key], v) : v[s.key];
                        val = s.format ? s.format(val) : (val || 'N/A') + (s.suffix || '');
                        bodyHtml += `<td>${val}</td>`;
                    });
                    bodyHtml += '</tr>';
                });
                body.innerHTML = bodyHtml;

            } catch (e) {
                console.error(e);
            }
        });

        function clearCompare() {
            localStorage.removeItem('compareList');
            window.location.reload();
        }
    </script>
</body>
</html>
